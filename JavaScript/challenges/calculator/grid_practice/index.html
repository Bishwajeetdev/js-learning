<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <style>
        body{
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
.container{
    padding: 1rem;
     width: 100%;
            height: 100%;
    display: grid;
    grid-template-areas: 
    "h h h"
    "s c1 c1"
    "s c2 c3"
    "f f f"
    ;
    gap: 1rem;

    /* grid-template-columns: repeat(auto-fit, minmax(200px, 500px)); */
    background-color: rgb(49, 48, 48);
}
.items{
    padding: 1rem;
    color: white;
   border: 3px solid black;
   background-color: rgb(85,85,208);
}
#header{
    grid-area: h;
}
#sidearea{
    grid-area: s;
}
#content1{
    grid-area: c1;
}
#content2{
    grid-area: c2;
}
#content3{ 
grid-area: c3;
}
#footer{
    grid-area: f;
}

    </style>
</head>
<body>
    
    <div class="container">
        <div class="items" id="header">a</div>
        <div class="items" id="sidearea">b</div>
        <div class="items" id="content1">c</div>
        <div class="items" id="content2">d</div>
        <div class="items" id="content3">e</div>
        <div class="items" id="footer">f</div>
      
    </div>



</body>
</html>
