<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Calculator</h1>

      <div class="cal-container">
        
          <div class="inputfield" id="inputfield"></div>


          <div class="grid-btn">
            <button class="buttons clear" id="buttons clear">c</button>
          <button class="buttons divide" id="buttons">/</button
          ><button class="buttons multi" id="buttons">*</button>
          <button class="buttons one" id="buttons">1</button
          ><button class="buttons two" id="buttons">2</button>
          <button class="buttons three" id="buttons">3</button
          ><button class="buttons four" id="buttons">4</button>
          <button class="buttons five" id="buttons">5</button
          ><button class="buttons six" id="buttons">6</button>
          <button class="buttons seven" id="buttons">7</button
          ><button class="buttons eight" id="buttons">8</button>
          
          <button class="buttons nine" id="buttons">9</button
          ><button class="buttons zero" id="buttons">0</button>
          <button class="buttons minus" id="buttons">-</button
          ><button class="buttons plus" id="buttons">+</button>
          <button class="buttons equal" id="buttons">=</button>
          </div>
        
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
