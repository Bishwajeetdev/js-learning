<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Calculator</h1>

      <div class="cal-container">
        
          <div class="inputfield" id="inputfield"></div>


          <div class="grid-btn">
            <button class="buttons clear" id="inputs clear">c</button>
          <button class="buttons divide" id="inputs">/</button
          ><button class="buttons multi" id="inputs">*</button>
          <button class="buttons one" id="inputs">1</button
          ><button class="buttons two" id="inputs">2</button>
          <button class="buttons three" id="inputs">3</button
          ><button class="buttons four" id="inputs">4</button>
          <button class="buttons five" id="inputs">5</button
          ><button class="buttons six" id="inputs">6</button>
          <button class="buttons seven" id="inputs">7</button
          ><button class="buttons eight" id="inputs">8</button>
          
          <button class="buttons nine" id="inputs">9</button
          ><button class="buttons zero" id="inputs">0</button>
          <button class="buttons minus" id="inputs">-</button
          ><button class="buttons plus" id="inputs">+</button>
          <button class="buttons equal" id="inputs">=</button>
          </div>
        
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
