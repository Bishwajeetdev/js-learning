<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<h1>Image Carousel</h1>

<div class="image-container">

    <div class="slider">
        <button id="left" class="left-btn"><img src="left-btn.png" alt=""></button>
        <img id="active" src="https://images.unsplash.com/photo-1773332611613-dbdc64f09807?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
    <img id="hide" src="https://images.unsplash.com/photo-1714976326337-f4b6266f56a9?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDN8fHxlbnwwfHx8fHw%3D" alt="">
    <img id="hide" src="https://plus.unsplash.com/premium_photo-1681492629133-3a3563ed7071?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
    <img id="hide" src="https://images.unsplash.com/photo-1553028826-f4804a6dba3b?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        <button id="right" class="right-btn"><img src="right-btn.png" alt=""></button>

    </div>
</div>
 <div class="circles">
        <span class="circle active"></span>
        <span class="circle "></span>
        <span class="circle"></span>
        <span class="circle"></span>
    </div>

<button id="auto-start" class="autostart">Auto Start</button>
    <script src="app.js"></script>
</body>
</html>
